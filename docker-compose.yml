# ═══════════════════════════════════════════════════════════════════
# Warehouse Assessment — Docker Compose (no-AI default)
# ═══════════════════════════════════════════════════════════════════
# Two services by default:
#   frontend  — nginx serving built SPA + proxying /api
#   backend   — Express + SQLite (data persisted via volume)
#
# AI is optional on this branch. Use local scripts or a custom override if
# you want to attach the AI sidecar later.
# ═══════════════════════════════════════════════════════════════════

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: warehouse-assessment-backend:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "3001:3001"
    volumes:
      - backend_data:/app/data # SQLite DB
      - backend_uploads:/app/uploads # Photo uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: warehouse-assessment-frontend:latest
    restart: unless-stopped
    ports:
      - "8157:80"
    depends_on:
      - backend
    networks:
      - app

volumes:
  backend_data:
  backend_uploads:

networks:
  app:
    driver: bridge
