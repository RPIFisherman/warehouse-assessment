name: Publish v1 dual packages

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: Container tag to publish
        required: true
        default: v1
      ai_ref:
        description: Git ref for the AI-configured image
        required: true
        default: v1.0.0-ai
      no_ai_ref:
        description: Git ref for the no-AI-configured image
        required: true
        default: no-ai-configured

permissions:
  contents: read
  packages: write

jobs:
  publish-ai-configured:
    name: Publish AI-configured image
    runs-on: ubuntu-latest
    steps:
      - name: Normalize registry owner
        run: echo "REGISTRY_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Check out AI source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ai_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Capture source SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push AI-configured image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REGISTRY_OWNER }}/warehouse-assessment-ai-configured:${{ inputs.version_tag }}
            ghcr.io/${{ env.REGISTRY_OWNER }}/warehouse-assessment-ai-configured:git-${{ steps.vars.outputs.short_sha }}

  publish-no-ai-configured:
    name: Publish no-AI-configured image
    runs-on: ubuntu-latest
    steps:
      - name: Normalize registry owner
        run: echo "REGISTRY_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Check out no-AI source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.no_ai_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Capture source SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push no-AI-configured image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.no-ai
          push: true
          tags: |
            ghcr.io/${{ env.REGISTRY_OWNER }}/warehouse-assessment-no-ai-configured:${{ inputs.version_tag }}
            ghcr.io/${{ env.REGISTRY_OWNER }}/warehouse-assessment-no-ai-configured:git-${{ steps.vars.outputs.short_sha }}
