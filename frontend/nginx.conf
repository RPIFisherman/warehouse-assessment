server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=()" always;
    # HSTS — only enable when TLS is terminated at this nginx (uncomment if applicable)
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Upload size — video can be 50-100 MB on mobile
    client_max_body_size 200M;

    # Never cache index.html (SPA entry point — must pick up new bundle hashes)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Hashed assets are content-addressable → cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # AI sidecar — must come before the /api catch-all (longest prefix wins
    # only if this block is declared first in nginx's location priority).
    location /api/ai/ {
        # Strip the /api/ai prefix so the sidecar sees /health, /assess-video, ...
        rewrite ^/api/ai/(.*)$ /$1 break;
        proxy_pass http://ai:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Video processing can be slow — 5 min timeout
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # Express backend
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Forward auth provider header so requireAuth picks the right validator
        proxy_set_header X-Auth-Provider $http_x_auth_provider;
        proxy_set_header Authorization $http_authorization;
    }

    # Photos served statically by backend
    location /uploads/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA fallback — every other path serves index.html, Vue Router takes over
    location / {
        try_files $uri $uri/ /index.html;
    }
}
